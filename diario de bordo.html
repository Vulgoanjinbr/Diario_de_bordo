<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Diario de bordo v3.0</title>
<style>
    :root {
        --sculk-green: #00ff9c;
        --sculk-cyan: #0ae7ff;
        --deep-void: #0a0a0a;
        --dark-gray: #1a1a1a;
        --text-gray: #cccccc;
        --blood-red: #ff3b3b;
        --alert-yellow: #ffd700;
        --experiment-purple: #a042ff;
        --sanity-blue: #4d8cff;
        --tab-gray: #2a2a2a;
        --luxury-gold: #FFD700;
        --luxury-purple: #9370DB;
        --desire-red: #FF6B6B;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: var(--deep-void);
        color: var(--sculk-green);
        font-family: 'Consolas', 'Monaco', monospace;
        height: 100vh;
        overflow: hidden;
        position: relative;
    }

    /* Modo sobrevivência - efeitos de corrupção */
    .corruption-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .corruption-1 {
        background: radial-gradient(circle at 30% 50%, rgba(160, 66, 255, 0.1) 0%, transparent 50%);
    }

    .corruption-2 {
        background: radial-gradient(circle at 70% 30%, rgba(255, 59, 59, 0.1) 0%, transparent 50%);
    }

    /* Interface principal */
    .app-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 10px;
        gap: 10px;
    }

    /* Barra superior com múltiplas funcionalidades */
    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        background-color: rgba(26, 26, 26, 0.9);
        border-radius: 4px;
        border: 1px solid rgba(0, 255, 156, 0.1);
    }

    .system-info {
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .stat-display {
        display: flex;
        gap: 15px;
    }

    .stat-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
    }

    .stat-bar {
        width: 60px;
        height: 6px;
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        overflow: hidden;
    }

    .stat-fill {
        height: 100%;
        transition: width 0.3s;
    }

    .sanity-fill { background-color: var(--sanity-blue); }
    .progress-fill { background-color: var(--sculk-green); }
    .corruption-fill { background-color: var(--experiment-purple); }

    /* Sistema de abas */
    .tab-system {
        display: flex;
        background-color: var(--tab-gray);
        border-radius: 4px 4px 0 0;
        overflow: hidden;
    }

    .tab {
        padding: 10px 20px;
        cursor: pointer;
        background-color: var(--dark-gray);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        transition: background-color 0.2s;
    }

    .tab.active {
        background-color: var(--deep-void);
        border-bottom: 2px solid var(--sculk-green);
    }

    .tab:hover:not(.active) {
        background-color: rgba(255, 255, 255, 0.05);
    }

    /* Conteúdo das abas */
    .tab-content {
        display: none;
        flex: 1;
        overflow: hidden;
    }

    .tab-content.active {
        display: flex;
        flex-direction: column;
    }

    /* Área principal (Terminal) */
    #terminal-tab {
        display: flex;
        flex-direction: column;
    }

    .terminal-log {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background-color: rgba(10, 10, 10, 0.8);
        font-size: 14px;
        line-height: 1.5;
    }

    .log-line {
        margin-bottom: 8px;
        white-space: pre-wrap;
        word-break: break-word;
        animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* Área de mídia */
    #media-tab {
        padding: 20px;
        overflow-y: auto;
    }

    .media-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
        padding: 10px;
    }

    .media-item {
        background-color: var(--dark-gray);
        border-radius: 4px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.2s;
        border: 1px solid rgba(0, 255, 156, 0.1);
    }

    .media-item:hover {
        transform: translateY(-2px);
        border-color: var(--sculk-green);
    }

    .media-preview {
        width: 100%;
        height: 150px;
        background-color: rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
    }

    .media-info {
        padding: 10px;
        font-size: 12px;
    }

    /* Área de mapa */
    #map-tab {
        padding: 20px;
        position: relative;
    }

    .map-container {
        width: 100%;
        height: 100%;
        background-color: var(--dark-gray);
        border-radius: 4px;
        position: relative;
        overflow: hidden;
    }

    .map-node {
        position: absolute;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.3s;
    }

    .map-node:hover {
        transform: scale(1.5);
        z-index: 10;
    }

    .map-node.lab { background-color: var(--sculk-green); }
    .map-node.experiment { background-color: var(--blood-red); }
    .map-node.sculk { background-color: var(--experiment-purple); }
    .map-node.containment { background-color: var(--alert-yellow); }
    .map-node.luxury { background-color: var(--luxury-gold); }

    /* Área de estatísticas */
    #stats-tab {
        padding: 20px;
        overflow-y: auto;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }

    .stats-card {
        background-color: var(--dark-gray);
        padding: 20px;
        border-radius: 4px;
        border: 1px solid rgba(0, 255, 156, 0.1);
    }

    .stats-title {
        color: var(--sculk-cyan);
        margin-bottom: 15px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(0, 255, 156, 0.2);
    }

    .achievement-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .achievement {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        background-color: rgba(0, 0, 0, 0.3);
        border-radius: 3px;
    }

    .achievement.unlocked {
        border-left: 3px solid var(--alert-yellow);
    }

    .achievement.locked {
        opacity: 0.5;
        filter: grayscale(1);
    }

    /* Input area */
    .input-area {
        display: flex;
        align-items: center;
        padding: 10px;
        background-color: var(--dark-gray);
        border-radius: 4px;
        margin-top: 10px;
        border: 1px solid rgba(0, 255, 156, 0.1);
    }

    .prompt {
        color: var(--sculk-cyan);
        margin-right: 10px;
        font-weight: bold;
        min-width: 160px;
    }

    #command-input {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--sculk-green);
        font-family: inherit;
        font-size: 14px;
        outline: none;
        padding: 5px 0;
    }

    /* Modos de jogo */
    .game-mode-selector {
        display: flex;
        gap: 10px;
        margin-left: 20px;
    }

    .mode-btn {
        padding: 6px 12px;
        background-color: rgba(0, 255, 156, 0.1);
        border: 1px solid var(--sculk-green);
        border-radius: 3px;
        color: var(--sculk-green);
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
    }

    .mode-btn:hover {
        background-color: rgba(0, 255, 156, 0.2);
    }

    .mode-btn.active {
        background-color: var(--sculk-green);
        color: var(--deep-void);
    }

    /* Sistema de puzzles */
    .puzzle-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        z-index: 10000;
        display: none;
        align-items: center;
        justify-content: center;
    }

    .puzzle-container {
        background-color: var(--dark-gray);
        padding: 30px;
        border-radius: 8px;
        border: 2px solid var(--experiment-purple);
        max-width: 600px;
        width: 90%;
    }

    .puzzle-title {
        color: var(--experiment-purple);
        margin-bottom: 20px;
        text-align: center;
    }

    .puzzle-content {
        margin-bottom: 20px;
    }

    .puzzle-input {
        width: 100%;
        padding: 10px;
        background-color: rgba(0, 0, 0, 0.5);
        border: 1px solid var(--sculk-green);
        color: var(--sculk-green);
        font-family: inherit;
        margin-bottom: 15px;
    }

    .puzzle-buttons {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
    }

    /* Classes de estilo para logs */
    .error { color: var(--blood-red); }
    .warning { color: var(--alert-yellow); }
    .success { color: var(--sculk-green); }
    .highlight { color: var(--sculk-cyan); }
    .info { color: var(--text-gray); }
    .purple { color: var(--experiment-purple); }
    .blue { color: var(--sanity-blue); }
    .gold { color: var(--luxury-gold); }
    .luxury-purple { color: var(--luxury-purple); }

    /* Scrollbar */
    .terminal-log::-webkit-scrollbar,
    #media-tab::-webkit-scrollbar,
    #stats-tab::-webkit-scrollbar {
        width: 8px;
    }

    .terminal-log::-webkit-scrollbar-track,
    #media-tab::-webkit-scrollbar-track,
    #stats-tab::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
    }

    .terminal-log::-webkit-scrollbar-thumb,
    #media-tab::-webkit-scrollbar-thumb,
    #stats-tab::-webkit-scrollbar-thumb {
        background: var(--sculk-green);
        border-radius: 4px;
    }

    /* Animações */
    @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    @keyframes desirePulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; color: var(--desire-red); }
    }

    .pulse {
        animation: pulse 2s infinite;
    }

    .shake {
        animation: shake 0.5s;
    }

    .desire-pulse {
        animation: desirePulse 2s infinite;
    }

    /* Responsividade */
    @media (max-width: 1200px) {
        .stat-display {
            flex-direction: column;
            gap: 5px;
        }
        
        .game-mode-selector {
            flex-wrap: wrap;
        }
    }
    
    /* =========================
       OLHO DO ABISMO
    ========================= */
    #void-eye-container {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, #111 0%, #000 70%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 20000;
        animation: voidFadeOut 4s ease forwards;
        animation-delay: 6s;
    }

    #void-eye {
        width: 320px;
        opacity: 0;
        animation:
            eyeAppear 2s ease forwards,
            eyeFloat 6s ease-in-out infinite,
            eyePulse 4s ease-in-out infinite;
        animation-delay: 1s;
        filter:
            drop-shadow(0 0 25px rgba(255, 215, 0, 0.4))
            drop-shadow(0 0 60px rgba(160, 66, 255, 0.2));
    }

    /* Aparição lenta */
    @keyframes eyeAppear {
        from {
            opacity: 0;
            transform: scale(0.8);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    /* Flutuação antinatural */
    @keyframes eyeFloat {
        0%, 100% {
            transform: translateY(0) scale(1);
        }
        50% {
            transform: translateY(-12px) scale(1.02);
        }
    }

    /* Pulso de consciência */
    @keyframes eyePulse {
        0%, 100% {
            filter:
                drop-shadow(0 0 20px rgba(255, 215, 0, 0.3))
                drop-shadow(0 0 50px rgba(160, 66, 255, 0.15));
        }
        50% {
            filter:
                drop-shadow(0 0 40px rgba(255, 215, 0, 0.6))
                drop-shadow(0 0 90px rgba(160, 66, 255, 0.4));
        }
    }

    @keyframes greedPulse {
        0%, 100% { 
            filter: 
                drop-shadow(0 0 30px rgba(255, 215, 0, 0.6))
                drop-shadow(0 0 70px rgba(160, 66, 255, 0.4))
                drop-shadow(0 0 120px rgba(255, 59, 59, 0.2));
        }
        50% { 
            filter: 
                drop-shadow(0 0 50px rgba(255, 215, 0, 0.9))
                drop-shadow(0 0 100px rgba(160, 66, 255, 0.6))
                drop-shadow(0 0 180px rgba(255, 59, 59, 0.4));
        }
    }

    /* Desaparecer no vazio */
    @keyframes voidFadeOut {
        to {
            opacity: 0;
            visibility: hidden;
        }
    }
    
    /* =========================
       EFEITOS DE GLITCH
    ========================= */
    .glitch-effect {
        position: relative;
        animation: glitch 0.3s infinite;
    }

    @keyframes glitch {
        0% {
            transform: translate(0);
            text-shadow: 0 0 0 rgba(255, 0, 0, 0);
        }
        20% {
            transform: translate(-2px, 2px);
            text-shadow: 2px 0 5px rgba(255, 0, 0, 0.5);
        }
        40% {
            transform: translate(2px, -1px);
            text-shadow: -2px 0 5px rgba(0, 255, 156, 0.5);
        }
        60% {
            transform: translate(-1px, 1px);
            text-shadow: 0 2px 5px rgba(160, 66, 255, 0.5);
        }
        80% {
            transform: translate(1px, -2px);
            text-shadow: 0 -2px 5px rgba(255, 59, 59, 0.5);
        }
        100% {
            transform: translate(0);
            text-shadow: 0 0 0 rgba(255, 0, 0, 0);
        }
    }

    /* =========================
       SANGUE ESCORRENDO
    ========================= */
    .blood-effect {
        position: fixed;
        pointer-events: none;
        z-index: 9998;
        opacity: 0;
    }

    .blood-drip {
        position: absolute;
        background: linear-gradient(to bottom, 
            transparent 0%, 
            var(--blood-red) 10%, 
            rgba(139, 0, 0, 0.8) 30%, 
            transparent 100%);
        width: 3px;
        animation: drip 15s linear forwards;
    }

    @keyframes drip {
        0% {
            height: 0;
            top: -10px;
            opacity: 1;
        }
        90% {
            opacity: 0.8;
        }
        100% {
            height: 110vh;
            top: 100vh;
            opacity: 0;
        }
    }

    /* =========================
       OLHOS NO FUNDO
    ========================= */
    .eye-background {
        position: fixed;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
        opacity: 0;
        transition: opacity 2s;
    }

    .eye {
        position: absolute;
        width: 40px;
        height: 40px;
        background: radial-gradient(circle at 30% 30%, 
            rgba(255, 255, 255, 0.1) 0%,
            rgba(160, 66, 255, 0.05) 30%,
            transparent 70%);
        border-radius: 50%;
        box-shadow: 
            0 0 20px rgba(160, 66, 255, 0.3),
            inset 0 0 10px rgba(255, 255, 255, 0.1);
        animation: eyeBlink 5s infinite;
    }

    .eye::before {
        content: '';
        position: absolute;
        width: 15px;
        height: 15px;
        background: rgba(0, 255, 156, 0.3);
        border-radius: 50%;
        top: 12px;
        left: 12px;
        animation: pupilMove 10s infinite alternate;
    }

    @keyframes eyeBlink {
        0%, 96%, 100% { transform: scaleY(1); }
        98% { transform: scaleY(0.1); }
    }

    @keyframes pupilMove {
        0% { transform: translate(0, 0); }
        25% { transform: translate(5px, 5px); }
        50% { transform: translate(-5px, -5px); }
        75% { transform: translate(3px, -3px); }
        100% { transform: translate(-3px, 3px); }
    }

    /* =========================
       RESPIRAÇÃO DO TERMINAL
    ========================= */
    .breathing-text {
        animation: breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
        0%, 100% {
            opacity: 0.7;
            transform: scale(1);
        }
        50% {
            opacity: 1;
            transform: scale(1.02);
        }
    }

    /* =========================
       TREMEDEIRA (SANIDADE BAIXA)
    ========================= */
    .low-sanity-shake {
        animation: sanityShake 0.5s infinite;
    }

    @keyframes sanityShake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-1px); }
        20%, 40%, 60%, 80% { transform: translateX(1px); }
    }

    /* =========================
       PULSO DE CORRUPÇÃO
    ========================= */
    .corruption-pulse {
        animation: corruptionPulse 3s infinite;
    }

    @keyframes corruptionPulse {
        0%, 100% { 
            box-shadow: 0 0 5px rgba(160, 66, 255, 0.1);
        }
        50% { 
            box-shadow: 0 0 20px rgba(160, 66, 255, 0.4);
        }
    }

    /* =========================
       EFEITOS ESPECIAIS DO GRIMM
    ========================= */
    @keyframes grimmBlue {
        0%, 100% { color: var(--sculk-cyan); }
        50% { color: #4a9eff; }
    }

    @keyframes panteraGlow {
        0%, 100% { box-shadow: 0 0 10px rgba(74, 158, 255, 0.3); }
        50% { box-shadow: 0 0 25px rgba(74, 158, 255, 0.7); }
    }

    .grimm-effect {
        animation: grimmBlue 2s infinite;
    }

    .pantera-glow {
        animation: panteraGlow 3s infinite;
    }
</style>
</head>
<body>
    <!-- Efeitos Visuais -->
<div id="blood-container" class="blood-effect"></div>
<div id="eye-background" class="eye-background"></div>
<div id="glitch-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9997; opacity:0; background:linear-gradient(transparent 50%, rgba(255,0,0,0.02) 50%); background-size:100% 4px; mix-blend-mode:overlay;"></div>

<!-- Sistema de Áudio -->
<audio id="typing-sound" preload="auto" style="display:none;"></audio>
<audio id="whisper-sound" preload="auto" style="display:none;"></audio>
<audio id="heartbeat-sound" preload="auto" style="display:none;" loop></audio>
<audio id="ambient-sound" preload="auto" style="display:none;" loop></audio>
<audio id="glitch-sound" preload="auto" style="display:none;"></audio>
<audio id="blood-drip-sound" preload="auto" style="display:none;"></audio>
    
<div id="void-eye-container">
    <img src="olhos da ganancia.png" id="void-eye">
</div>

    <!-- Overlays -->
    <div class="corruption-overlay corruption-1"></div>
    <div class="corruption-overlay corruption-2"></div>
    
    <!-- Puzzle Overlay -->
    <div class="puzzle-overlay" id="puzzle-overlay">
        <div class="puzzle-container">
            <div class="puzzle-title" id="puzzle-title">ENIGMA DO ABISMO</div>
            <div class="puzzle-content" id="puzzle-content"></div>
            <input type="text" class="puzzle-input" id="puzzle-input" placeholder="Sua resposta...">
            <div class="puzzle-buttons">
                <button class="mode-btn" onclick="submitPuzzle()">Enviar</button>
                <button class="mode-btn" onclick="closePuzzle()" style="background-color: rgba(255, 59, 59, 0.1); border-color: var(--blood-red); color: var(--blood-red);">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div class="app-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="system-info">
                <div class="system-title">DIÁRIO DE BORDO v3.0</div>
                <div class="game-mode-selector">
                    <div class="mode-btn" data-mode="story" onclick="changeGameMode('story')">HISTÓRIA</div>
                    <div class="mode-btn" data-mode="investigation" onclick="changeGameMode('investigation')">INVESTIGAÇÃO</div>
                    <div class="mode-btn" data-mode="survival" onclick="changeGameMode('survival')">SOBREVIVÊNCIA</div>
                </div>
            </div>
            
            <div class="stat-display">
                <div class="stat-item">
                    <span>SAÚDE MENTAL</span>
                    <div class="stat-bar">
                        <div class="stat-fill sanity-fill" id="sanity-bar"></div>
                    </div>
                    <span id="sanity-value">80%</span>
                </div>
                <div class="stat-item">
                    <span>PROGRESSO</span>
                    <div class="stat-bar">
                        <div class="stat-fill progress-fill" id="progress-bar"></div>
                    </div>
                    <span id="progress-value">30%</span>
                </div>
                <div class="stat-item">
                    <span>CORRUPÇÃO</span>
                    <div class="stat-bar">
                        <div class="stat-fill corruption-fill" id="corruption-bar"></div>
                    </div>
                    <span id="corruption-value">10%</span>
                </div>
            </div>
        </div>

        <!-- Tab System -->
        <div class="tab-system">
            <div class="tab active" data-tab="terminal" onclick="changeTab('terminal')">TERMINAL</div>
            <div class="tab" data-tab="media" onclick="changeTab('media')">MÍDIA</div>
            <div class="tab" data-tab="map" onclick="changeTab('map')">MAPA</div>
            <div class="tab" data-tab="stats" onclick="changeTab('stats')">ESTATÍSTICAS</div>
        </div>

        <!-- Tab Contents -->
        <div class="tab-content active" id="terminal-tab">
            <div class="terminal-log" id="terminal-log"></div>
            <div class="input-area">
                <div class="prompt" id="prompt">pesquisador@lab:~$</div>
                <input type="text" id="command-input" autofocus autocomplete="off" placeholder="Digite 'help' para começar...">
            </div>
        </div>

        <div class="tab-content" id="media-tab">
            <div class="media-grid" id="media-grid">
                <!-- Media items will be inserted here -->
            </div>
        </div>

        <div class="tab-content" id="map-tab">
            <div class="map-container" id="map-container">
                <!-- Map nodes will be inserted here -->
            </div>
        </div>

        <div class="tab-content" id="stats-tab">
            <div class="stats-grid" id="stats-grid">
                <!-- Statistics will be inserted here -->
            </div>
        </div>

        case 'luxury-purple': colorClass = 'luxury-purple'; break;
        default: colorClass = 'info';
    }
    
    line.innerHTML = `<span class="${colorClass}">${message}</span>`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
}

function updateStats() {
    document.getElementById('sanity-bar').style.width = `${GameState.sanity}%`;
    document.getElementById('progress-bar').style.width = `${GameState.progress}%`;
    document.getElementById('corruption-bar').style.width = `${GameState.corruption}%`;
    
    document.getElementById('sanity-value').textContent = `${GameState.sanity}%`;
    document.getElementById('progress-value').textContent = `${GameState.progress}%`;
    document.getElementById('corruption-value').textContent = `${GameState.corruption}%`;
    
    if (GameState.sanity < 30) {
        document.body.style.filter = 'grayscale(0.3) contrast(1.2) hue-rotate(-10deg)';
    } else if (GameState.sanity < 50) {
        document.body.style.filter = 'grayscale(0.1) contrast(1.1)';
    } else {
        document.body.style.filter = 'none';
    }
    
    const overlays = document.querySelectorAll('.corruption-overlay');
    const opacity = GameState.corruption / 100 * 0.5;
    overlays.forEach(overlay => {
        overlay.style.opacity = opacity.toString();
    });
    
    updateEyeCorruption();
    autoSave();
    
    if (typeof VisualEffects !== 'undefined' && VisualEffects.updateEffects) {
        VisualEffects.updateEffects();
    }
}

function updateEyeCorruption() {
    const eye = document.getElementById('void-eye');
    if (!eye) return;

    const intensity = GameState.corruption / 100;
    
    eye.style.filter = `
        drop-shadow(0 0 ${25 + intensity * 50}px rgba(255, 215, 0, ${0.3 + intensity * 0.5}))
        drop-shadow(0 0 ${60 + intensity * 90}px rgba(160, 66, 255, ${0.2 + intensity * 0.3}))
    `;
}

function changeTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
    });
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
    });
    
    document.getElementById(`${tabName}-tab`).classList.add('active');
    document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
    
    if (tabName === 'terminal') {
        document.getElementById('command-input').focus();
    }
}

function addXP(amount) {
    GameState.xp += amount;
    const neededXP = GameState.level * 100;
    
    if (GameState.xp >= neededXP) {
        GameState.level++;
        GameState.xp = GameState.xp - neededXP;
        addLog(`<span class="success">🎉 NÍVEL ${GameState.level} ALCANÇADO!</span>`, 'success');
        GameState.sanity = Math.min(100, GameState.sanity + 10);
        updateStats();
    }
    
    updateStats();
}

function unlockAchievement(name) {
    if (!GameState.achievements.has(name) && achievementsList[name]) {
        GameState.achievements.add(name);
        achievementsList[name].unlocked = true;
        
        addLog(`<span class="success">🏆 CONQUISTA: ${name}</span>`, 'success');
        addLog(achievementsList[name].description, 'info');
        
        addXP(50);
        renderAchievements();
        
        if (name === 'Herdeira do Bazar') {
            addLog('<span class="gold">🏆 VOCÊ DESCOBRIU O SEGREDO DA FAMÍLIA FACILIER!</span>', 'gold');
            addLog('O BaZzar não é apenas uma loja... é um legado.', 'info');
        }
        
        if (name === 'Mestra da Persuasão') {
            addLog('<span class="gold">🏆 VOCÊ COMPREENDEU A ARTE DA PERSUASÃO!</span>', 'gold');
            addLog('Às vezes, as pessoas preferem mentiras confortáveis.', 'info');
        }
    }
}

function autoSave() {
    const saveData = {
        ...GameState,
        achievements: Array.from(GameState.achievements),
        unlockedExperiments: Array.from(GameState.unlockedExperiments),
        discoveredMedia: Array.from(GameState.discoveredMedia),
        visitedLocations: Array.from(GameState.visitedLocations),
        timestamp: Date.now()
    };
    
    localStorage.setItem('diario_bordo_save', JSON.stringify(saveData));
    addLog('[SISTEMA] Progresso salvo automaticamente', 'info');
}

function loadSave() {
    const saved = localStorage.getItem('diario_bordo_save');
    if (saved) {
        const saveData = JSON.parse(saved);
        Object.assign(GameState, saveData);
        
        GameState.achievements = new Set(saveData.achievements);
        GameState.unlockedExperiments = new Set(saveData.unlockedExperiments);
        GameState.discoveredMedia = new Set(saveData.discoveredMedia);
        GameState.visitedLocations = new Set(saveData.visitedLocations);
        
        addLog('[SISTEMA] Progresso carregado', 'success');
        updateStats();
        updateMediaGrid();
        updateMap();
        renderAchievements();
    }
}

function showPuzzle(type, data = {}) {
    const overlay = document.getElementById('puzzle-overlay');
    const title = document.getElementById('puzzle-title');
    const content = document.getElementById('puzzle-content');
    const input = document.getElementById('puzzle-input');
    
    currentPuzzle = { type, data };
    
    switch(type) {
        case 'auth':
            title.textContent = 'AUTENTICAÇÃO REQUERIDA';
            content.innerHTML = `
                <p>Acesso a: <span class="highlight">${data.experiment.title}</span></p>
                <p>${data.puzzle.question}</p>
                ${data.puzzle.hint ? `<p class="info">Dica: ${data.puzzle.hint}</p>` : ''}
            `;
            break;
            
        case 'decrypt':
            title.textContent = 'DESCRIPTOGRAFIA AVANÇADA';
            content.innerHTML = `
                <p>Resolva o enigma:</p>
                <p class="purple">"Se vc falhou em nascer, sua natureza..."</p>
                <p class="info">(Resposta em português)</p>
            `;
            break;
            
        case 'corruption':
            title.textContent = 'TENTATIVA DE CORRUPÇÃO';
            content.innerHTML = `
                <p class="warning">O Abismo tenta influenciar você:</p>
                <p>"Para criar vida, primeiro deve-se..."</p>
                <p class="info">Complete a frase</p>
            `;
            break;
    }
    
    overlay.style.display = 'flex';
    input.value = '';
    input.focus();
}

function submitPuzzle() {
    const input = document.getElementById('puzzle-input');
    const answer = input.value.trim().toUpperCase();
    
    if (!currentPuzzle) return;
    
    switch(currentPuzzle.type) {
        case 'auth':
            if (answer === currentPuzzle.data.puzzle.answer) {
                addLog('[AUTENTICAÇÃO] Acesso concedido!', 'success');
                GameState.unlockedExperiments.add(currentPuzzle.data.code);
                showExperiment(currentPuzzle.data.experiment);
                addXP(25);
                unlockAchievement('Decifrador');
            } else {
                addLog('[AUTENTICAÇÃO] Resposta incorreta. Acesso negado.', 'error');
                GameState.sanity = Math.max(0, GameState.sanity - 5);
                updateStats();
            }
            break;
            
        case 'decrypt':
            if (answer === 'DEUS' || answer === 'MORRER') {
                addLog('[DESCRIPTOGRAFIA] Sistema completo desbloqueado!', 'success');
                Object.keys(experiments).forEach(code => {
                    GameState.unlockedExperiments.add(code);
                });
                GameState.progress = 100;
                updateStats();
                addXP(100);
                unlockAchievement('Mestre do Abismo');
            } else {
                addLog('[DESCRIPTOGRAFIA] Falha na descriptografia.', 'error');
            }
            break;
            
        case 'corruption':
            if (answer === 'DESTRUIR' || answer === 'CONSUMIR') {
                addLog('[CORRUPÇÃO] Você cedeu à influência...', 'warning');
                GameState.corruption += 15;
                GameState.sanity -= 10;
                updateStats();
            } else {
                addLog('[CORRUPÇÃO] Você resistiu.', 'success');
                GameState.sanity += 5;
                updateStats();
            }
            break;
        case 'ushka_password':
            if (answer === '7114114391' || answer === 'GANANCIA') {
                addLog('[ACESSO] Senha correta! Acessando arquivo USHKA...', 'success');
                const experiment = experiments['USHKAFILE'];
                GameState.unlockedExperiments.add('USHKAFILE');
                showExperiment(experiment);
                unlockAchievement('Acesso Secreto');
                addXP(30);
                closePuzzle();
            } else {
                addLog('[ACESSO] Senha incorreta. Acesso negado.', 'error');
                GameState.sanity = Math.max(0, GameState.sanity - 3);
                updateStats();
                setTimeout(() => {
                    input.value = '';
                    input.focus();
                }, 500);
            }
            break;
    }
}

function closePuzzle() {
    document.getElementById('puzzle-overlay').style.display = 'none';
    currentPuzzle = null;
    document.getElementById('command-input').focus();
}

function showExperiment(experiment) {
    const block = document.createElement('div');
    block.className = 'content-block';
    block.style.margin = '20px 0';
    block.style.padding = '20px';
    block.style.backgroundColor = 'rgba(26, 26, 26, 0.8)';
    
    if (experiment.corrupted) {
        block.style.borderLeft = '3px solid var(--luxury-gold)';
        block.style.boxShadow = '0 0 15px rgba(255, 215, 0, 0.2)';
    } else {
        block.style.borderLeft = '3px solid var(--sculk-green)';
    }
    
    block.innerHTML = `
        <div style="color:var(--sculk-cyan); font-size:16px; margin-bottom:15px; padding-bottom:8px; border-bottom:1px solid rgba(0,255,156,0.1);">
            ${experiment.title} 
            ${experiment.corrupted ? '<span style="color:var(--luxury-gold); margin-left:10px;">👁️ OLHO DA GANÂNCIA</span>' : ''}
            <span style="color:var(--experiment-purple); font-size:12px; float:right;">${experiment.classification}</span>
        </div>
        <div style="color:var(--text-gray); line-height:1.6;">
            ${experiment.content}
        </div>
    `;
    
    document.getElementById('terminal-log').appendChild(block);
    document.getElementById('terminal-log').scrollTop = document.getElementById('terminal-log').scrollHeight;
    
    if (experiment.media) {
        experiment.media.forEach(mediaId => {
            GameState.discoveredMedia.add(mediaId);
        });
        updateMediaGrid();
    }
    
    if (experiment.location) {
        GameState.visitedLocations.add(experiment.title);
        updateMap();
    }
    
    if (experiment.corrupted) {
        GameState.corruption = Math.min(100, GameState.corruption + 8);
        GameState.sanity = Math.max(0, GameState.sanity - 5);
        addLog('<span class="gold">👁️ O Olho da Ganância observa seu interesse...</span>', 'gold');
    }
    
    GameState.progress += 10;
    updateStats();
    addXP(25);
    
    const corruptedCount = Object.values(experiments).filter(exp => 
        exp.corrupted && GameState.unlockedExperiments.has(Object.keys(experiments).find(k => experiments[k] === exp))
    ).length;
    
    if (corruptedCount >= 3 && !GameState.achievements.has('Observador do Abismo')) {
        unlockAchievement('Observador do Abismo');
    }
    
    if (corruptedCount >= 6 && !GameState.achievements.has('Mestre da Ganância')) {
        unlockAchievement('Mestre da Ganância');
    }
}

function updateMediaGrid() {
    const grid = document.getElementById('media-grid');
    grid.innerHTML = '';
    
    Object.keys(mediaItems).forEach(id => {
        if (GameState.discoveredMedia.has(id) || GameState.progress > 50) {
            const media = mediaItems[id];
            const item = document.createElement('div');
            item.className = 'media-item';
            item.onclick = () => showMediaDetail(media);
            
            let preview = '📁';
            if (media.type === 'image') preview = '🖼️';
            else if (media.type === 'audio') preview = '🎵';
            else if (media.type === 'map') preview = '🗺️';
            else if (media.type === 'text') preview = '📄';
            
            item.innerHTML = `
                <div class="media-preview">${preview}</div>
                <div class="media-info">
                    <strong>${media.title}</strong><br>
                    <small>${media.type.toUpperCase()} | ${media.description}</small>
                </div>
            `;
            
            grid.appendChild(item);
        }
    });
}

function showMediaDetail(media) {
    addLog(`<span class="highlight">${media.title}</span>`, 'info');
    addLog(`Tipo: ${media.type.toUpperCase()}`, 'info');

    Object.values(experiments).forEach(exp => {

            const type = exp.corrupted ? 'luxury' : 'experiment';
            createMapNode(exp.location.x, exp.location.y, type, exp.code, `Experimento: ${exp.title.split(':')[0]}`);

function createMapNode(x, y, type, title, description, customColor = null) {
    const node = document.createElement('div');
    node.className = `map-node ${type}`;
    node.style.left = `${x}%`;
    node.style.top = `${y}%`;
    node.title = `${title}\n${description}`;
    
    if (customColor === 'luxury-purple') {
        node.style.backgroundColor = 'var(--luxury-purple)';
    }
    
    node.onclick = () => {
        addLog(`<span class="highlight">LOCAL:</span> ${title}`, 'info');
        addLog(description, 'info');
        
        if (type === 'luxury') {
            addLog('<span class="gold">👁️ Local marcado pelo Olho da Ganância</span>', 'gold');
        }
        
        GameState.visitedLocations.add(title);
    };
    
    document.getElementById('map-container').appendChild(node);
}

                addLog('Digite "list" para ver experimentos disponíveis', 'info');

                showPasswordPromptForUshka();
                return;
            }
            
            const experiment = experiments[chave];

                addLog(`Chave de acesso não reconhecida: ${chave}`, 'error');
                addLog('Use "list" para ver experimentos disponíveis', 'info');
                return;
            }
            
            if (!GameState.unlockedExperiments.has(chave)) {
                startAuthentication(chave, experiment);
            } else {
                showExperiment(experiment);
            }
        }

// ==================== SISTEMA DE MODOS ====================
function changeGameMode(mode) {
    if (GameState.mode === 'survival' && GameState.corruptionInterval) {
        clearInterval(GameState.corruptionInterval);
        GameState.corruptionInterval = null;
        
        const bloodContainer = document.getElementById('blood-container');
        if (bloodContainer) bloodContainer.innerHTML = '';
        
        const glitchOverlay = document.getElementById('glitch-overlay');
        if (glitchOverlay) glitchOverlay.style.opacity = '0';
    }
    
    GameState.mode = mode;
    
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.mode === mode) {
            btn.classList.add('active');
        }
    });
    
 switch(mode) {
    case 'story':
        addLog('[MODO] Modo História ativado.', 'highlight');
        startStoryMode();
        break;
    case 'investigation':
        addLog('[MODO] Modo Investigação ativado.', 'highlight');
        startInvestigationMode();
        break;
    case 'survival':
        addLog('[MODO] Modo Sobrevivência ativado.', 'warning');
        startSurvivalMode();
        break;
}

updateUI();
}

function startStoryMode() {
if (GameState.progress === 0) {
    setTimeout(() => {
        addLog('[NARRATIVA] Sistema DIÁRIO DE BORDO v3.0 inicializado', 'blue');
        addLog('[NARRATIVA] Acessando registros do Pesquisador...', 'blue');
        addLog('[NARRATIVA] Use os comandos para explorar os experimentos.', 'info');
        addLog('[SISTEMA] Conectando ao Arquivo do Olho da Ganância...', 'gold');
        addLog('[SISTEMA] Use "list" para ver experimentos disponíveis', 'gold');
        addLog('[SISTEMA] ⚠️  AVISO: Estes registros contêm experimentos extremos', 'warning');
        addLog('[SISTEMA] ⚠️  Realizados sob influência do Olho da Ganância', 'warning');
    }, 1000);
}
}

function startInvestigationMode() {
setTimeout(() => {
    addLog('[INVESTIGAÇÃO] Mistério #1: O que aconteceu com a Cobaia 7?', 'purple');
    addLog('[INVESTIGAÇÃO] Mistério #2: Origem do Sculk', 'purple');
    addLog('[INVESTIGAÇÃO] Use comandos: examine, analyze, connect', 'purple');
}, 1000);
}

function startSurvivalMode() {
const overlays = document.querySelectorAll('.corruption-overlay');
overlays.forEach(overlay => {
    overlay.style.opacity = '0.3';
});

if (!GameState.corruptionInterval) {
    GameState.corruptionInterval = setInterval(() => {
        attemptCorruption();
        
        if (typeof VisualEffects !== 'undefined') {
            if (Math.random() > 0.7) {
                VisualEffects.playRandomWhisper();
            }
            if (Math.random() > 0.8) {
                VisualEffects.createBloodDrip();
            }
        }
    }, 30000);
}
}

function attemptCorruption() {
if (GameState.mode !== 'survival') return;

const corruptionAttempts = [
    () => {
        addLog('[ABISMO] JUNTE-SE A NÓS... O CONHECIMENTO É ILIMITADO...', 'purple');
        GameState.corruption += 5;
        updateStats();
    },
    () => {
        addLog('[VOZES] Por que se limitar à moralidade humana?', 'purple');
        showPuzzle('corruption');
    },
    () => {
        document.body.classList.add('shake');
        setTimeout(() => document.body.classList.remove('shake'), 500);
        addLog('[CORRUPÇÃO] O sistema treme... algo está tentando entrar.', 'warning');
    }
];

const attempt = corruptionAttempts[Math.floor(Math.random() * corruptionAttempts.length)];
attempt();
}

// ==================== EFEITOS VISUAIS ====================
const VisualEffects = {
isGlitchActive: false,
isBloodActive: false,
eyesCount: 0,
maxEyes: 15,

init() {
    this.createEyes();
    this.setupAudio();
    this.startAmbientSounds();
    this.applyBreathingEffect();
    
    setInterval(() => this.updateEffects(), 1000);
},

createEyes() {
    const container = document.getElementById('eye-background');
    if (!container) return;
    
    for (let i = 0; i < this.maxEyes; i++) {
        setTimeout(() => {
            const eye = document.createElement('div');
            eye.className = 'eye';
            
            eye.style.left = `${Math.random() * 100}%`;
            eye.style.top = `${Math.random() * 100}%`;
            
            const size = 20 + Math.random() * 40;
            eye.style.width = `${size}px`;
            eye.style.height = `${size}px`;
            
            eye.style.opacity = 0.1 + Math.random() * 0.3;
            
            container.appendChild(eye);
            this.eyesCount++;
        }, i * 500);
    }
},

setupAudio() {
    this.typingSounds = [
        'https://assets.mixkit.co/sfx/preview/mixkit-fast-typing-on-typewriter-1116.mp3',
        'https://assets.mixkit.co/sfx/preview/mixkit-hard-typewriter-click-1119.mp3',
        'https://assets.mixkit.co/sfx/preview/mixkit-typewriter-click-1115.mp3'
    ];        
    this.heartbeatSound = 'https://assets.mixkit.co/sfx/preview/mixkit-single-heartbeat-493.mp3';
    this.ambientSound = 'https://assets.mixkit.co/sfx/preview/mixkit-sci-fi-ambience-353.mp3';
    this.glitchSound = 'https://assets.mixkit.co/sfx/preview/mixkit-computer-glitch-2338.mp3';
    this.bloodSound = 'https://assets.mixkit.co/sfx/preview/mixkit-water-drip-3000.mp3';
    
    this.whisperSounds = [
        'https://assets.mixkit.co/sfx/preview/mixkit-male-voice-whisper-1136.mp3',
        'https://assets.mixkit.co/sfx/preview/mixkit-female-voice-whisper-1137.mp3'
    ];
},

startAmbientSounds() {
    const ambient = document.getElementById('ambient-sound');
    if (ambient) {
        try {
            ambient.src = this.ambientSound;
            ambient.volume = 0.1;
            ambient.play().catch(e => console.log('Audio autoplay blocked:', e));
        } catch (e) {
            console.log('Usando fallback de áudio');
        }
    }
},

updateEffects() {
    this.updateSanityEffects();
    this.updateCorruptionEffects();
    this.updateSurvivalEffects();
},

updateSanityEffects() {
    const sanity = GameState.sanity;
    const eyeBg = document.getElementById('eye-background');
    const glitchOverlay = document.getElementById('glitch-overlay');
    
    if (sanity < 50) {
        const opacity = (50 - sanity) / 100;
        if (eyeBg) eyeBg.style.opacity = Math.min(opacity, 0.5);
        
        if (sanity < 30 && glitchOverlay) {
            glitchOverlay.style.opacity = (30 - sanity) / 50;
        }
        
        if (sanity < 20 && !document.body.classList.contains('low-sanity-shake')) {
            document.body.classList.add('low-sanity-shake');
        }
        
        if (sanity < 40 && Math.random() > 0.7) {
            this.applyRandomGlitch();
        }
    } else {
        if (eyeBg) eyeBg.style.opacity = 0;
        if (glitchOverlay) glitchOverlay.style.opacity = 0;
        document.body.classList.remove('low-sanity-shake');
    }
},

updateCorruptionEffects() {
    const corruption = GameState.corruption;
    
    this.updateHeartbeat(corruption);
    
    if (corruption > 30 && Math.random() > 0.95) {
        this.playRandomWhisper();
    }
    
    if (corruption > 50) {
        const elements = document.querySelectorAll('.tab, .mode-btn, .stat-item');
        elements.forEach(el => {
            if (!el.classList.contains('corruption-pulse') && Math.random() > 0.8) {
                el.classList.add('corruption-pulse');
                setTimeout(() => el.classList.remove('corruption-pulse'), 3000);
            }
        });
    }
},

updateSurvivalEffects() {
    if (GameState.mode === 'survival') {
        if (!this.isBloodActive && Math.random() > 0.95) {
            this.createBloodDrip();
        }
        
        const survivalTime = GameState.commandHistory.length;
        if (survivalTime > 50 && Math.random() > 0.98) {
            this.playGlitchSound();
        }
    }
},

applyRandomGlitch() {
    const logLines = document.querySelectorAll('.log-line');
    if (logLines.length > 0) {
        const randomLine = logLines[Math.floor(Math.random() * logLines.length)];
        randomLine.classList.add('glitch-effect');
        
        this.playGlitchSound();
        
        setTimeout(() => {
            randomLine.classList.remove('glitch-effect');
        }, 500);
    }
},

createBloodDrip() {
    this.isBloodActive = true;
    const container = document.getElementById('blood-container');
    
    for (let i = 0; i < 3; i++) {
        const drip = document.createElement('div');
        drip.className = 'blood-drip';
        
        const side = Math.floor(Math.random() * 4);
        switch(side) {
            case 0:
                drip.style.left = `${Math.random() * 100}%`;
                drip.style.top = '0';
                break;
            case 1:
                drip.style.right = '0';
                drip.style.top = `${Math.random() * 100}%`;
                drip.style.transform = 'rotate(90deg)';
                break;
            case 2:
                drip.style.left = `${Math.random() * 100}%`;
                drip.style.bottom = '0';
                drip.style.transform = 'rotate(180deg)';
                break;
            case 3:
                drip.style.left = '0';
                drip.style.top = `${Math.random() * 100}%`;
                drip.style.transform = 'rotate(270deg)';
                break;
        }
        
        const red = 139 + Math.floor(Math.random() * 100);
        drip.style.background = `linear-gradient(to bottom, 
            transparent 0%, 
            rgba(${red}, 0, 0, 0.8) 10%, 
            rgba(139, 0, 0, 0.6) 30%, 
            transparent 100%)`;
        
        container.appendChild(drip);
        
        this.playBloodDripSound();
        
        setTimeout(() => {
            if (drip.parentNode === container) {
                container.removeChild(drip);
            }
        }, 15000);
    }
    
    setTimeout(() => {
        this.isBloodActive = false;
    }, 5000);
},

updateHeartbeat(corruption) {
    const heartbeat = document.getElementById('heartbeat-sound');
    if (!heartbeat) return;
    
    if (corruption > 20) {
        if (heartbeat.paused) {
            try {
                heartbeat.src = this.heartbeatSound;
                heartbeat.volume = 0.1 + (corruption / 100) * 0.3;
                heartbeat.play().catch(e => console.log('Heartbeat audio error:', e));
            } catch (e) {
                console.log('Heartbeat fallback');
            }
        }
        
        heartbeat.volume = 0.1 + (corruption / 100) * 0.4;
        
    } else {
        heartbeat.pause();
        heartbeat.currentTime = 0;
    }
},

playTypingSound() {
    if (Math.random() > 0.3) return;
    
    const typing = document.getElementById('typing-sound');
    if (typing) {
        const randomSound = this.typingSounds[Math.floor(Math.random() * this.typingSounds.length)];
        try {
            typing.src = randomSound;
            typing.volume = 0.2;
            typing.currentTime = 0;
            typing.play().catch(e => console.log('Typing sound error'));
        } catch (e) {
        }
    }
},

playRandomWhisper() {
    const whisper = document.getElementById('whisper-sound');
    if (whisper) {
        const randomSound = this.whisperSounds[Math.floor(Math.random() * this.whisperSounds.length)];
        try {
            whisper.src = randomSound;
            whisper.volume = 0.05 + (GameState.corruption / 100) * 0.1;
            whisper.currentTime = 0;
            whisper.play().catch(e => console.log('Whisper sound error'));
            
            this.showWhisperEffect();
        } catch (e) {
        }
    }
},

showWhisperEffect() {
    const whisperText = document.createElement('div');
    whisperText.style.position = 'fixed';
    whisperText.style.left = `${10 + Math.random() * 80}%`;
    whisperText.style.top = `${10 + Math.random() * 80}%`;
    whisperText.style.color = 'rgba(160, 66, 255, 0.7)';
    whisperText.style.fontSize = '14px';
    whisperText.style.fontFamily = 'Consolas, monospace';
    whisperText.style.pointerEvents = 'none';
    whisperText.style.zIndex = '10000';
    whisperText.style.textShadow = '0 0 10px rgba(160, 66, 255, 0.5)';
    whisperText.style.opacity = '0';
    
    const whispers = [
        'Junte-se a nós...',
        'O conhecimento é dor...',
        'Você está sozinho...',
        'O Olho observa...',
        'Corrompa-se...',
        'A verdade machuca...',
        'Abra seus olhos...',
        'Não resista...',
        'Seja um com o Abismo...',
        'A ganância é virtude...'
    ];
    
    whisperText.textContent = whispers[Math.floor(Math.random() * whispers.length)];
    document.body.appendChild(whisperText);
    
    whisperText.animate([
        { opacity: 0, transform: 'translateY(10px)' },
        { opacity: 0.8, transform: 'translateY(0)' },
        { opacity: 0, transform: 'translateY(-10px)' }
    ], {
        duration: 3000,
        easing: 'ease-in-out'
    });
    
    setTimeout(() => {
        if (whisperText.parentNode) {
            whisperText.parentNode.removeChild(whisperText);
        }
    }, 3000);
},

playGlitchSound() {
    const glitch = document.getElementById('glitch-sound');
    if (glitch && Math.random() > 0.5) {
        try {
            glitch.src = this.glitchSound;
            glitch.volume = 0.3;
            glitch.currentTime = 0;
            glitch.play().catch(e => console.log('Glitch sound error'));
        } catch (e) {
        }
    }
},

playBloodDripSound() {
    const blood = document.getElementById('blood-drip-sound');
    if (blood) {
        try {
            blood.src = this.bloodSound;
            blood.volume = 0.2;
            blood.currentTime = 0;
            blood.play().catch(e => console.log('Blood drip sound error'));
        } catch (e) {
        }
    }
},

applyBreathingEffect() {
    const prompt = document.querySelector('.prompt');
    if (prompt && !prompt.classList.contains('breathing-text')) {
        prompt.classList.add('breathing-text');
    }
    
    const logs = document.querySelectorAll('.log-line');
    if (logs.length > 0 && Math.random() > 0.8) {
        const randomLog = logs[Math.floor(Math.random() * logs.length)];
        randomLog.classList.add('breathing-text');
        setTimeout(() => randomLog.classList.remove('breathing-text'), 8000);
    }
}
};

// ==================== INICIALIZAÇÃO ====================
function init() {
console.log("Sistema iniciando...");

loadSave();

const input = document.getElementById('command-input');
const prompt = document.getElementById('prompt');

updateMediaGrid();
updateMap();

VisualEffects.init();

setTimeout(() => {
    addLog('DIÁRIO DE BORDO v3.0 - SISTEMA INICIALIZADO', 'highlight');
    addLog('Digite "help" para ver os comandos disponíveis', 'info');
    
    if (GameState.commandHistory.length === 0) {
        unlockAchievement('Primeiro Acesso');
    }
}, 500);

input.addEventListener('keydown', (e) => {
    if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Enter') {
        VisualEffects.playTypingSound();
    }
    
    if (e.key === 'Enter') {
        const commandText = input.value.trim();
        if (commandText) {
            GameState.commandHistory.push(commandText);
            
            prompt.textContent = `pesquisador@${GameState.mode}:~$`;
            addLog(`<span class="prompt">pesquisador@${GameState.mode}:~$</span> ${commandText}`, 'info');
            
            const parts = commandText.split(' ');
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1);
            
            if (commands[cmd]) {
                commands[cmd].execute(args);
                
                // Verificar conquistas específicas após comandos
                if (cmd.startsWith('grimm_')) {
                    checkGrimmAchievements();
                } else if (cmd.startsWith('abel_')) {
                    checkAbelAchievements();
                } else if (cmd.startsWith('mira_')) {
                    checkMiraAchievements();
                }
            } else {
                addLog(`Comando não encontrado: ${cmd}`, 'error');
                addLog('Digite "help" para ajuda', 'info');
            }
            
            input.value = '';
            updateUI();
        }
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (GameState.commandHistory.length > 0) {
            if (GameState.historyIndex === undefined) {
                GameState.historyIndex = GameState.commandHistory.length - 1;
            } else {
                GameState.historyIndex = Math.max(0, GameState.historyIndex - 1);
            }
            input.value = GameState.commandHistory[GameState.historyIndex];
        }
    } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (GameState.historyIndex !== undefined) {
            if (GameState.historyIndex >= GameState.commandHistory.length - 1) {
                GameState.historyIndex = undefined;
                input.value = '';
            } else {
                GameState.historyIndex++;
                input.value = GameState.commandHistory[GameState.historyIndex];
            }
        }
    }
});

input.focus();

const placeholders = [
    'Digite "list" para ver experimentos...',
    'Tente "access EXPERIMENTO047"...',
    'Use "access EXPERIMENTO184" para infecções...',
    'Acesse "EXPERIMENTO201" para projeto gestação...',
    'Digite "help" para todos os comandos...',
    'Digite "preguiça" para saber sobre Hypnos...',
    'Use "abandono" para história triste de Hypnos...',
    'Tente "desespero" para o final da história...',
    'Digite "treinamento" para saber sobre a arma...',
    'Use "grimm_fera" para conhecer a fera primordial...',
    'Tente "multile_pantera_completo" para ascensão canibal...',
    'Digite "pacto_cachorrinho" para o momento icônico...',
    'Explore "encontro_violet" para o confronto com Violet...',
    'Digite "mira_origem" para conhecer a história sombria...',
    'Digite "abel_origem" para o banquete do exílio...',
    'Use "abel_gula" para a ascensão do Novo Gula...',
    'Tente "abel_filosofia" para compreender o peso da alma...',
    'Explore "abel_pacto" para o pacto com Violet...',
    'Conheça "abel_seraph" e a travessia da fada...'
];

let phIndex = 0;
let typing = true;
let phText = '';

function typePlaceholder() {
    if (typing) {
        if (phText.length < placeholders[phIndex].length) {
            phText += placeholders[phIndex][phText.length];
            input.placeholder = phText;
            setTimeout(typePlaceholder, 50);
        } else {
            typing = false;
            setTimeout(typePlaceholder, 2000);
        }
    } else {
        if (phText.length > 0) {
            phText = phText.slice(0, -1);
            input.placeholder = phText;
            setTimeout(typePlaceholder, 30);
        } else {
            typing = true;
            phIndex = (phIndex + 1) % placeholders.length;
            setTimeout(typePlaceholder, 500);
        }
    }
}

typePlaceholder();

setInterval(autoSave, 60000);

setInterval(() => {
    if (Math.random() > 0.6) {
        blinkEye();
    }
}, 3000 + Math.random() * 4000);
}

// Função para verificar conquistas de Abel
function checkAbelAchievements() {
let abelCommandsUsed = 0;
const abelCommands = ['abel_origem', 'abel_seraph', 'abel_gula', 'abel_pacto', 'abel_filosofia'];

GameState.commandHistory.forEach(cmd => {
    const baseCmd = cmd.split(' ')[0].toLowerCase();
    if (abelCommands.includes(baseCmd)) {
        abelCommandsUsed++;
    }
});

if (abelCommandsUsed >= 1 && !GameState.achievements.has('Príncipe do Banquete')) {
    unlockAchievement('Príncipe do Banquete');
}
if (abelCommandsUsed >= 2 && !GameState.achievements.has('Patricida Nobre')) {
    unlockAchievement('Patricida Nobre');
}
if (abelCommandsUsed >= 3 && !GameState.achievements.has('Sobrevivente do Vazio')) {
    unlockAchievement('Sobrevivente do Vazio');
}
if (abelCommandsUsed >= 4 && !GameState.achievements.has('Nova Gula')) {
    unlockAchievement('Nova Gula');
}
if (abelCommandsUsed >= 5 && !GameState.achievements.has('Mestre de Cerimônias')) {
    unlockAchievement('Mestre de Cerimônias');
    unlockAchievement('Peso da Alma');
}
}

// Função para verificar conquistas de Mira
function checkMiraAchievements() {
let miraCommandsUsed = 0;
const miraCommands = ['mira_origem'];

GameState.commandHistory.forEach(cmd => {
    const baseCmd = cmd.split(' ')[0].toLowerCase();
    if (miraCommands.includes(baseCmd)) {
        miraCommandsUsed++;
    }
});

if (miraCommandsUsed >= 1 && !GameState.achievements.has('Última dos Castello')) {
    unlockAchievement('Última dos Castello');
}
}


window.addEventListener('DOMContentLoaded', init);
</script>
